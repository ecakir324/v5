plugins {
    id 'com.android.application'
}

android {
    namespace 'com.privora.app'
    compileSdk 34

    defaultConfig {
        applicationId 'com.privora.app'
        minSdk 23
        targetSdk 34
        versionCode 5
        versionName '1.3.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
